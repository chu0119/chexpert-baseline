# CheXpert Baseline 配置文件

# 数据路径（WSL2 Ubuntu 环境）
data:
  csv_dir: "/mnt/host/e/yibao/archive"
  image_dir: "/mnt/host/e/yibao/archive"
  train_csv: "train.csv"
  valid_csv: "valid.csv"

# CheXpert 14个竞争赛道标签
# 0=阴性, 1=阳性, -1=不确定
labels:
  - "No Finding"
  - "Enlarged Cardiomediastinum"
  - "Cardiomegaly"
  - "Lung Opacity"
  - "Lung Lesion"
  - "Edema"
  - "Consolidation"
  - "Pneumonia"
  - "Atelectasis"
  - "Pneumothorax"
  - "Pleural Effusion"
  - "Pleural Other"
  - "Fracture"
  - "Support Devices"

# 训练时使用的标签子集
train_labels:
  - "Atelectasis"
  - "Cardiomegaly"
  - "Consolidation"
  - "Edema"
  - "Pleural Effusion"
  - "Pneumonia"
  - "Pneumothorax"

# 不确定值的处理方式: "ignore"(当作0) 或 "ones"(当作1)
uncertain_handling: "ignore"

# 模型配置
model:
  name: "convnext_base"
  pretrained: true
  num_classes: 7
  dropout: 0.3

# 训练配置（WSL2 Linux 环境，支持多进程）
training:
  image_size: 320
  batch_size: 32
  num_workers: 4
  epochs: 50
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: "cosine"
  warmup_epochs: 2
  mixup_alpha: 0.2
  label_smoothing: 0.1

# 保存路径
output:
  save_dir: "/mnt/host/e/yibao/chexpert-baseline/outputs"
  model_name: "convnext_chexpert"
